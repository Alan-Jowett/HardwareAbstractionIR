[package]
name = "embassy-smoke"
version = "0.1.0"
edition = "2024"

[dependencies]
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
cortex-m-semihosting = "0.5"
embassy-executor = { version = "0.7", features = ["arch-cortex-m", "executor-thread"] }
embassy-time = "0.5.1"
lm3s6965_embassy_hal = { package = "lm3s6965-embassy-hal", path = "../embassy" }
panic-halt = "1.0"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
