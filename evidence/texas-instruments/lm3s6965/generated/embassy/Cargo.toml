[package]
name = "lm3s6965-embassy-hal"
version = "0.1.0"
edition = "2024"

[lib]
name = "lm3s6965_embassy_hal"
path = "src/lib.rs"

[features]
default = []
gpio = []
i2c = []
interrupt = []
rcc = []
spi = []
time = ["dep:critical-section", "dep:embassy-time-driver", "dep:embassy-time-queue-utils"]
timer = []
uart = []

[dependencies]
critical-section = { version = "1.2", optional = true }
embassy-time-driver = { version = "0.2.2", optional = true }
embassy-time-queue-utils = { version = "0.3.2", features = ["generic-queue-8"], optional = true }
