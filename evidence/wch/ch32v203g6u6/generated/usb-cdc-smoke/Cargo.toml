[package]
name = "usb-cdc-smoke"
version = "0.1.0"
edition = "2024"

[dependencies]
ch32v203g6u6_pac = { package = "ch32v203g6u6-pac", path = "../pac" }
riscv = { version = "0.12", features = ["critical-section-single-hart"] }
riscv-rt = "0.13"

[profile.dev]
panic = "abort"
opt-level = "z"

[profile.release]
panic = "abort"
opt-level = "z"
lto = true
codegen-units = 1
