[package]
name = "ch32v203g6u6-embassy-hal"
version = "0.1.0"
edition = "2024"

[lib]
name = "ch32v203g6u6_embassy_hal"
path = "src/lib.rs"

[features]
adc = []
default = []
dma = []
dma-async = ["dma", "interrupt"]
flash = ["dep:embedded-storage"]
gpio = []
gpio-async-wait = ["dep:critical-section", "dep:embedded-hal", "dep:embedded-hal-async", "gpio", "interrupt"]
i2c = ["dep:embedded-hal"]
i2c-async = ["dep:critical-section", "dep:embedded-hal-async", "i2c", "interrupt"]
interrupt = []
pwm = ["dep:embedded-hal"]
rcc = []
rtc = []
spi = []
time = ["dep:critical-section", "dep:embassy-time-driver", "dep:embassy-time-queue-utils"]
timer = []
uart = []
usb = ["dep:critical-section", "dep:embassy-usb-driver"]
watchdog = ["dep:embedded-hal-02"]
wch-runtime = ["interrupt", "time"]

[dependencies]
critical-section = { version = "1.2", optional = true }
embassy-time-driver = { version = "0.2.2", features = ["tick-hz-1_000"], optional = true }
embassy-time-queue-utils = { version = "0.3.2", features = ["generic-queue-8"], optional = true }
embassy-usb-driver = { version = "0.2.2", optional = true }
embedded-hal = { version = "1.0", optional = true }
embedded-hal-async = { version = "1.0", optional = true }
embedded-hal-02 = { package = "embedded-hal", version = "0.2.7", features = ["unproven"], optional = true }
embedded-storage = { version = "0.3", optional = true }
