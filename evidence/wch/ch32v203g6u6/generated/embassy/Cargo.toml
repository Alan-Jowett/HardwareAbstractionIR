[package]
name = "ch32v203g6u6-embassy-hal"
version = "0.1.0"
edition = "2024"

[lib]
name = "ch32v203g6u6_embassy_hal"
path = "src/lib.rs"

[dependencies]
critical-section = "1.2"
embassy-time-driver = { version = "0.2.2", features = ["tick-hz-1_000"] }
embassy-time-queue-utils = { version = "0.3.2", features = ["generic-queue-8"] }
embassy-usb-driver = "0.2.2"
embedded-hal = "1.0"
embedded-can = "0.4"
