[package]
name = "embassy-flash-smoke"
version = "0.1.0"
edition = "2024"

[dependencies]
ch32v203g6u6_embassy_hal = { package = "ch32v203g6u6-embassy-hal", path = "../embassy", features = ["flash", "gpio"] }
embedded-storage = "0.3"
riscv = { version = "0.12", features = ["critical-section-single-hart"] }
riscv-rt = "0.13"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
opt-level = "z"
lto = true
codegen-units = 1
