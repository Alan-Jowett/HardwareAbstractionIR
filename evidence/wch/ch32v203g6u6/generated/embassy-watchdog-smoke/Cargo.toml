[package]
name = "embassy-watchdog-smoke"
version = "0.1.0"
edition = "2024"

[dependencies]
ch32v203g6u6_embassy_hal = { package = "ch32v203g6u6-embassy-hal", path = "../embassy", features = ["gpio", "rcc", "usb", "watchdog", "wch-runtime"] }
embassy-executor = { version = "0.7.0", features = ["arch-spin", "executor-thread"] }
embassy-time = "0.5.1"
embassy-usb = "0.6.0"
embedded-hal-02 = { package = "embedded-hal", version = "0.2.7", features = ["unproven"] }
heapless = "0.8.0"
riscv = { version = "0.12", features = ["critical-section-single-hart"] }
riscv-rt = "0.13"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
opt-level = "z"
lto = true
codegen-units = 1
