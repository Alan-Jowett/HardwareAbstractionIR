[package]
name = "embassy-usb-smoke"
version = "0.1.0"
edition = "2024"

[dependencies]
esp-bootloader-esp-idf = { version = "0.5.0", features = ["esp32c3"] }
embassy-executor = { version = "0.7.0", features = ["arch-riscv32", "executor-thread"] }
embassy-time = "0.5.1"
esp-hal = { version = "1.1.1", features = ["esp32c3", "unstable"] }
esp32c3fn4_generated = { package = "esp32c3fn4-generated", path = "../embassy", features = ["gpio", "time", "usb"] }
panic-halt = "1.0"
static_cell = "2.1.0"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
